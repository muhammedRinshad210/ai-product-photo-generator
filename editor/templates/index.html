<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
body {
    text-align: center;
    font-family: Arial;
    background: #f5f5f5;
}

h1 {
    color: #333;
}

button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

img {
    margin-top: 20px;
    border-radius: 10px;
}
.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

img {
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    background: #2196F3;
    color: white;
    border-radius: 5px;
}

button:hover {
    background: #1976D2;
}
</style>
<body>
    <h2>Upload Image</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="file" name="image" >

        <h1>AI Photo Editor</h1> 

        <button name="filter" value="bw">Black & White</button>
        <button name="filter" value="enhance">Enhance</button>
        <button name="filter" value="warm">Warm</button>
        <button name="filter" value="hdr">HDR</button>
        <button name="filter" value="beauty">Beauty</button>
        <button name="filter" value="blur">Blur</button>
        
    </form>

    {% if image_url %}
    <h3>Result : </h3>
    <img src="{{ image_url }}" width="300">

    <br><br>
    

    <a href="{{ image_url }}" download>
        <button>Download Image</button>
    </a>
    <br><br>

    <h3>Before / After</h3>

    <div style="display: flex; justify-content: center; gap: 20px;">
        <div>
            <p>Original</p>
            <img src = "{{ original_url }}" width="250">
        </div>

        <div>
            <p>Edited</p>
            <img src="{{ image_url }}" width="250">
        </div>

            
        </div>
    </div>
    {% endif %}
    
    
</body>
</html>
